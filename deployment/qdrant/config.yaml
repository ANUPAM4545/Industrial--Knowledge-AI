# ═══════════════════════════════════════════════════════════════
# Qdrant Configuration — ForgeMind AI
# ═══════════════════════════════════════════════════════════════

service:
  host: 0.0.0.0
  http_port: 6333
  grpc_port: 6334
  enable_cors: true

storage:
  storage_path: /qdrant/storage
  snapshots_path: /qdrant/snapshots
  on_disk_payload: true
  performance:
    max_search_threads: 0  # auto
    max_optimization_threads: 1

log_level: INFO

telemetry_disabled: true
