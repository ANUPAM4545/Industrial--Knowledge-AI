# ═══════════════════════════════════════════════════════════════
#  ForgeMind AI — Docker Compose (Production)
# ═══════════════════════════════════════════════════════════════

name: forgemind-ai

x-common-variables: &common-variables
  APP_NAME: ${APP_NAME:-ForgeMind AI}
  APP_ENV: ${APP_ENV:-production}

x-backend-variables: &backend-variables
  DATABASE_URL: ${DATABASE_URL}
  REDIS_URL: ${REDIS_URL}
  JWT_SECRET_KEY: ${JWT_SECRET_KEY}
  JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
  JWT_ACCESS_TOKEN_EXPIRE_MINUTES: ${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-60}
  ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
  AI_SERVICE_URL: ${AI_SERVICE_URL:-http://ai-service:8001}
  UPLOAD_DIR: ${UPLOAD_DIR:-/app/uploads}
  MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-50}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

x-ai-variables: &ai-variables
  OPENAI_API_KEY: ${OPENAI_API_KEY}
  OPENAI_API_BASE: ${OPENAI_API_BASE:-https://api.openai.com/v1}
  LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
  LLM_TEMPERATURE: ${LLM_TEMPERATURE:-0.1}
  EMBEDDING_MODEL: ${EMBEDDING_MODEL:-BAAI/bge-large-en-v1.5}
  QDRANT_HOST: ${QDRANT_HOST:-qdrant}
  QDRANT_PORT: ${QDRANT_PORT:-6333}
  QDRANT_COLLECTION_NAME: ${QDRANT_COLLECTION_NAME:-forgemind_knowledge}
  RAG_CHUNK_SIZE: ${RAG_CHUNK_SIZE:-512}
  RAG_CHUNK_OVERLAP: ${RAG_CHUNK_OVERLAP:-64}
  RAG_TOP_K: ${RAG_TOP_K:-5}
  REDIS_URL: ${REDIS_URL}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}

services:

  # ─── Nginx Reverse Proxy ───────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: forgemind-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deployment/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deployment/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      - frontend
      - backend
      - ai-service
    networks:
      - forgemind-net
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Frontend (React + Vite) ───────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: forgemind-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000}
      VITE_APP_NAME: ${VITE_APP_NAME:-ForgeMind AI}
    networks:
      - forgemind-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:80/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ─── Backend API (FastAPI) ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: forgemind-backend
    restart: unless-stopped
    environment:
      <<: [*common-variables, *backend-variables]
    env_file:
      - .env
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - forgemind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ─── Celery Worker ─────────────────────────────────────────────
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    container_name: forgemind-worker
    restart: unless-stopped
    command: celery -A app.worker worker --loglevel=info --concurrency=${CELERY_WORKER_CONCURRENCY:-4}
    environment:
      <<: [*common-variables, *backend-variables]
      CELERY_BROKER_URL: ${CELERY_BROKER_URL}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND}
    env_file:
      - .env
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - forgemind-net

  # ─── AI Service (LangChain RAG) ────────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
      target: production
    container_name: forgemind-ai-service
    restart: unless-stopped
    environment:
      <<: [*common-variables, *ai-variables]
    env_file:
      - .env
    volumes:
      - uploads-data:/app/uploads:ro
      - ai-models:/app/models
    depends_on:
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - forgemind-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ─── PostgreSQL ────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: forgemind-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-forgemind_db}
      POSTGRES_USER: ${POSTGRES_USER:-forgemind}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./deployment/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - forgemind-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-forgemind} -d ${POSTGRES_DB:-forgemind_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # ─── Qdrant Vector Database ────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    container_name: forgemind-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
      - ./deployment/qdrant/config.yaml:/qdrant/config/production.yaml:ro
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    networks:
      - forgemind-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ─── Redis ────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: forgemind-redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secure_password}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis-data:/data
    networks:
      - forgemind-net
    healthcheck:
      test: ["CMD", "redis-cli", "--no-auth-warning", "-a", "${REDIS_PASSWORD:-redis_secure_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ─── Networks ─────────────────────────────────────────────────────
networks:
  forgemind-net:
    driver: bridge
    name: forgemind-network

# ─── Volumes ──────────────────────────────────────────────────────
volumes:
  postgres-data:
    name: forgemind-postgres-data
  qdrant-data:
    name: forgemind-qdrant-data
  redis-data:
    name: forgemind-redis-data
  uploads-data:
    name: forgemind-uploads
  ai-models:
    name: forgemind-ai-models
  nginx-logs:
    name: forgemind-nginx-logs
