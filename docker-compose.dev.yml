# ═══════════════════════════════════════════════════════════════
#  NEXO — Docker Compose Dev Override
#  Usage: docker compose -f docker-compose.yml -f docker-compose.dev.yml up
# ═══════════════════════════════════════════════════════════════

name: forgemind-ai

services:

  # ─── Frontend Dev (Vite HMR) ──────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: forgemind-frontend-dev
    ports:
      - "3001:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_BASE_URL: http://localhost:8005
      VITE_AI_SERVICE_URL: http://localhost:8006
      VITE_APP_NAME: "NEXO [DEV]"
    command: npm run dev -- --host 0.0.0.0

  # ─── Backend Dev (Hot Reload) ──────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: forgemind-backend-dev
    ports:
      - "8005:8000"
    volumes:
      - ./backend:/app
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
      UPLOAD_DIR: "/tmp/uploads"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # ─── AI Service Dev (Hot Reload) ──────────────────────────────
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
      target: development
    container_name: forgemind-ai-dev
    ports:
      - "8006:8001"
    volumes:
      - ./ai-service:/app
    environment:
      APP_ENV: development
      APP_DEBUG: "true"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --reload

  # ─── pgAdmin (Dev Only) ───────────────────────────────────────
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: forgemind-pgadmin
    restart: unless-stopped
    ports:
      - "50500:80"
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@nexo.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-pgadmin_password}
      PGADMIN_CONFIG_SERVER_MODE: "False"
    volumes:
      - pgadmin-data:/var/lib/pgadmin
    networks:
      - forgemind-net
    depends_on:
      - postgres

  # ─── PostgreSQL (expose port in dev) ──────────────────────────
  postgres:
    ports:
      - "54350:5432"

  # ─── Redis (expose port in dev) ───────────────────────────────
  redis:
    ports:
      - "6379:6379"

  # ─── Disable nginx in dev (direct port access) ────────────────
  nginx:
    profiles:
      - nginx

  # ─── Disable worker in dev (crashing due to missing celery app) ────────────────
  worker:
    profiles:
      - disabled

volumes:
  pgadmin-data:
    name: forgemind-pgadmin-data
