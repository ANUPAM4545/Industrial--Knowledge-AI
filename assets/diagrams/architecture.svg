<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" width="100%" height="100%">
    <defs>
        <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#0a0b10" />
            <stop offset="100%" stop-color="#12141d" />
        </linearGradient>
        <linearGradient id="card-grad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#1a1c29" />
            <stop offset="100%" stop-color="#232635" />
        </linearGradient>
        <linearGradient id="accent-grad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#3b82f6" />
            <stop offset="50%" stop-color="#8b5cf6" />
            <stop offset="100%" stop-color="#f59e0b" />
        </linearGradient>
        <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
            <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000" flood-opacity="0.4"/>
        </filter>
        <filter id="glow">
            <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
            <feMerge>
                <feMergeNode in="coloredBlur"/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <!-- Background -->
    <rect width="800" height="500" fill="url(#bg-grad)" rx="16" />
    
    <!-- Title -->
    <text x="400" y="50" font-family="-apple-system, system-ui, sans-serif" font-size="24" font-weight="700" fill="#fff" text-anchor="middle" letter-spacing="1">NEXO SYSTEM ARCHITECTURE</text>
    <rect x="350" y="65" width="100" height="4" fill="url(#accent-grad)" rx="2" />

    <!-- Boxes -->
    <g transform="translate(50, 120)" filter="url(#shadow)">
        <rect width="200" height="300" fill="url(#card-grad)" rx="12" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5" />
        <text x="100" y="40" font-family="sans-serif" font-size="16" font-weight="600" fill="#cbd5e1" text-anchor="middle">CLIENT LAYER</text>
        
        <rect x="25" y="80" width="150" height="40" rx="6" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.5"/>
        <text x="100" y="105" font-family="sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">React Frontend (Vite)</text>

        <rect x="25" y="140" width="150" height="40" rx="6" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-opacity="0.5"/>
        <text x="100" y="165" font-family="sans-serif" font-size="14" fill="#93c5fd" text-anchor="middle">PWA Interface</text>

        <rect x="25" y="200" width="150" height="40" rx="6" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-opacity="0.5"/>
        <text x="100" y="225" font-family="sans-serif" font-size="14" fill="#fcd34d" text-anchor="middle">Clerk Auth</text>
    </g>

    <g transform="translate(300, 120)" filter="url(#shadow)">
        <rect width="200" height="300" fill="url(#card-grad)" rx="12" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5" />
        <text x="100" y="40" font-family="sans-serif" font-size="16" font-weight="600" fill="#cbd5e1" text-anchor="middle">API GATEWAY &amp; COMPUTE</text>
        
        <rect x="25" y="80" width="150" height="40" rx="6" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.5"/>
        <text x="100" y="105" font-family="sans-serif" font-size="14" fill="#c4b5fd" text-anchor="middle">FastAPI Backend</text>

        <rect x="25" y="140" width="150" height="40" rx="6" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.5"/>
        <text x="100" y="165" font-family="sans-serif" font-size="14" fill="#c4b5fd" text-anchor="middle">Security Pipeline</text>

        <rect x="25" y="200" width="150" height="40" rx="6" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-opacity="0.5"/>
        <text x="100" y="225" font-family="sans-serif" font-size="14" fill="#c4b5fd" text-anchor="middle">RAG Orchestrator</text>
    </g>

    <g transform="translate(550, 120)" filter="url(#shadow)">
        <rect width="200" height="300" fill="url(#card-grad)" rx="12" stroke="#ffffff" stroke-opacity="0.1" stroke-width="1.5" />
        <text x="100" y="40" font-family="sans-serif" font-size="16" font-weight="600" fill="#cbd5e1" text-anchor="middle">DATA &amp; AI LAYER</text>
        
        <rect x="25" y="80" width="150" height="40" rx="6" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.5"/>
        <text x="100" y="105" font-family="sans-serif" font-size="14" fill="#6ee7b7" text-anchor="middle">PostgreSQL / Redis</text>

        <rect x="25" y="140" width="150" height="40" rx="6" fill="#10b981" fill-opacity="0.1" stroke="#10b981" stroke-opacity="0.5"/>
        <text x="100" y="165" font-family="sans-serif" font-size="14" fill="#6ee7b7" text-anchor="middle">Qdrant Vector DB</text>

        <rect x="25" y="200" width="150" height="40" rx="6" fill="#ec4899" fill-opacity="0.1" stroke="#ec4899" stroke-opacity="0.5"/>
        <text x="100" y="225" font-family="sans-serif" font-size="14" fill="#f9a8d4" text-anchor="middle">Gemini LLM / Embeds</text>
    </g>

    <!-- Connectors -->
    <path d="M 250 270 L 300 270" stroke="url(#accent-grad)" stroke-width="3" fill="none" stroke-dasharray="6,4" />
    <path d="M 500 270 L 550 270" stroke="url(#accent-grad)" stroke-width="3" fill="none" stroke-dasharray="6,4" />
    
    <path d="M 250 160 L 300 160" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrow)" />
    <path d="M 500 160 L 550 160" stroke="#8b5cf6" stroke-width="2" fill="none" marker-end="url(#arrow)" />

    <defs>
        <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="6" markerHeight="6" orient="auto">
            <path d="M 0 0 L 10 5 L 0 10 z" fill="#8b5cf6" />
        </marker>
    </defs>
</svg>